services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: player2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: player2
      POSTGRES_USER: player2
      POSTGRES_PASSWORD: player2
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7.4-alpine
    container_name: player2-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: quay.io/minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: player2-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: player2minio
      MINIO_ROOT_PASSWORD: player2miniosecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  mailpit:
    image: axllent/mailpit:v1.21
    container_name: player2-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  livekit:
    image: livekit/livekit-server:v1.9.1
    container_name: player2-livekit
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    depends_on:
      - redis
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50010:50000-50010/udp"
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro

  caddy:
    image: caddy:2.10
    container_name: player2-caddy
    restart: unless-stopped
    depends_on:
      - livekit
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  minio-data:
  caddy-data:
  caddy-config:

